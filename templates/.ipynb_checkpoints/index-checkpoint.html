<!DOCTYPE html>
<html>
<head>
    <title>Stroke Risk Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding-top: 50px;
        }
        .container {
            background-color: #ffffff;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input, select {
            width: 100%;
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }
        button {
            grid-column: span 2;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #45a049;
        }
        .result {
            grid-column: span 2;
            text-align: center;
            font-size: 18px;
            margin-top: 20px;
        }
        .high-risk { color: red; font-weight: bold; }
        .low-risk { color: green; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Stroke Risk Prediction</h1>
        <form method="post" action="/predict">
            <div>
                <label for="age">Age:</label>
                <input type="number" id="age" name="age" placeholder="Enter age" required>
            </div>
            <div>
                <label for="gender">Gender:</label>
                <select id="gender" name="gender" required>
                    <option value="" selected disabled>Select Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                </select>
            </div>
            <div>
                <label for="hypertension">Hypertension:</label>
                <select id="hypertension" name="hypertension" required>
                    <option value="" selected disabled>Select</option>
                    <option>No</option>
                    <option>Yes</option>
                </select>
            </div>
            <div>
                <label for="heart_disease">Heart Disease:</label>
                <select id="heart_disease" name="heart_disease" required>
                    <option value="" selected disabled>Select</option>
                    <option>No</option>
                    <option>Yes</option>
                </select>
            </div>
            <div>
                <label for="glucose">Avg Glucose Level:</label>
                <input type="number" id="glucose" name="glucose" placeholder="mg/dL" step="0.1" required>
            </div>
            <div>
                <label for="bmi">BMI:</label>
                <input type="number" id="bmi" name="bmi" placeholder="Body Mass Index" step="0.1" required>
            </div>
            <div>
                <label for="ever_married">Ever Married:</label>
                <select id="ever_married" name="ever_married" required>
                    <option value="" selected disabled>Select</option>
                    <option>No</option>
                    <option>Yes</option>
                </select>
            </div>
            <div>
                <label for="work_type">Work Type:</label>
                <select id="work_type" name="work_type" required>
                    <option value="" selected disabled>Select</option>
                    <option>Private</option>
                    <option>Self-employed</option>
                    <option>Govt_job</option>
                    <option>children</option>
                    <option>Never_worked</option>
                </select>
            </div>
            <div>
                <label for="residence_type">Residence Type:</label>
                <select id="residence_type" name="residence_type" required>
                    <option value="" selected disabled>Select</option>
                    <option>Urban</option>
                    <option>Rural</option>
                </select>
            </div>
            <div>
                <label for="smoking_status">Smoking Status:</label>
                <select id="smoking_status" name="smoking_status" required>
                    <option value="" selected disabled>Select</option>
                    <option>never smoked</option>
                    <option>formerly smoked</option>
                    <option>smokes</option>
                    <option>Unknown</option>
                </select>
            </div>
            <div>
                <label for="model">Choose Model:</label>
                <select id="model" name="model" required>
                    <option value="" selected disabled>Select</option>
                    <option>Logistic Regression</option>
                    <option>Decision Tree</option>
                    <option>Random Forest</option>
                </select>
            </div>
            <button type="submit">Predict</button>

            {% if result %}
                <div class="result {% if 'High' in result %}high-risk{% else %}low-risk{% endif %}">
                    Model: {{ chosen }}<br>
                    {{ result }}
                </div>
            {% endif %}
        </form>
    </div>
</body>
</html>
